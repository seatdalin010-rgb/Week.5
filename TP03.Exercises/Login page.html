<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #f4f5f7;
    }
    .card {
        display: flex;
        width: 950px;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    .left {
        flex: 1;
        background: #fff;
        padding: 40px 50px;
    }
    .right {
        flex: 1;
        background-image: url('https://images.pexels.com/photos/38419793/pexels-photo-38419793.jpeg');
        background-size: cover;
        background-position: center;
    }
    .logo {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: bold;
        font-size: 18px;
        color: #1a1a2e;
        margin-bottom: 60px;
    }
    .logo-icon {
        width: 26px;
        height: 26px;
        background: #6c5ce7;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 13px;
    }
    h1 {
        font-size: 26px;
        margin: 0 0 6px 0;
        color: #1a1a2e;
    }
    .subtitle {
        color: #8a8fa3;
        font-size: 13px;
        margin: 0 0 24px 0;
    }
    .google-button {
        width: 100%;
        height: 42px;
        border: 1px solid #e4e6ef;
        border-radius: 8px;
        background: #fafafa;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 13px;
        color: #333;
        cursor: pointer;
        margin-bottom: 18px;
    }
    .google-button:hover {
        background: #f0f0f0;
    }
    .divider {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #a0a4b8;
        font-size: 12px;
        margin-bottom: 18px;
    }
    .divider::before,
    .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #e4e6ef;
    }
    label {
        display: block;
        font-size: 13px;
        font-weight: bold;
        color: #1a1a2e;
        margin-bottom: 6px;
    }
    .field {
        margin-bottom: 18px;
        position: relative;
    }
    .field input {
        width: 100%;
        height: 42px;
        border: 1px solid #e4e6ef;
        border-radius: 8px;
        padding: 0 14px;
        font-size: 13px;
        outline: none;
    }
    .field input:hover {
        border-color: #6c5ce7;
    }
    .field .eye {
        position: absolute;
        right: 14px;
        top: 38px;
        color: #a0a4b8;
        cursor: pointer;
    }
    .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        font-size: 13px;
    }
    .remember {
        display: flex;
        align-items: center;
        gap: 6px;
        color: #333;
    }
    .row a {
        color: #6c5ce7;
        text-decoration: none;
    }
    .signin-button {
        width: 100%;
        height: 44px;
        border: none;
        border-radius: 8px;
        background: #6c5ce7;
        color: #fff;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        margin-bottom: 18px;
    }
    .signin-button:hover {
        background: #5a4bd1;
    }
    .bottom-text {
        font-size: 13px;
        color: #8a8fa3;
        text-align: center;
    }
    .bottom-text a {
        color: #6c5ce7;
        text-decoration: none;
        font-weight: bold;
    }
    </style>   
</head>
<body>
    <div class="card">
        <div class="left">
            <div class="logo">
                <div class="logo-icon"><i class="fa-solid fa-circle-half-stroke"></i></div> HorizonUI
            </div>
            <h1>Welcome back!</h1>
            <p class="subtitle">Please enter your credentials to access your account</p>
            <button class="google-button">
                <i class="fa-brands fa-google"></i> Sign in with Google
            </button>
            <div class="divider">or</div>
            <div class="field">
                <label>Email*</label>
                <input type="email" placeholder="dalin@gmail.com">
            </div>
            <div class="field">
                <label>Password*</label>
                <input type="password" placeholder=" six seven ">
                <span class="eye"><i class="fa-regular fa-eye"></i></span>
            </div>
            <div class="row">
                <label class="remember">
                    <input type="checkbox" checked style="width:auto;height:auto;">Remember me
                </label>
                <a href="#">Forget password?</a>
            </div>
            <button class="signin-button">Sign In</button>
            <p class="bottom-text">Not registered yet? <a href="#">Create an Account</a></p>
        </div>
        <div class="right"></div>
    </div>
</body>
</html>
