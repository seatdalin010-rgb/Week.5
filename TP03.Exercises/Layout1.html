<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout1</title>
</head>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    .container {
        background-color: rgb(20, 119, 20);
        width: 400px;
        padding: 10px;
        margin: auto;
    }
    .nav,
    .header,
    .section,
    .aside,
    .footer {
        background-color: rgb(159, 223, 159);
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
    }
    .article {
        color: white;
        padding: 10px;
        margin-bottom: 10px;
        background-color: rgb(90, 170, 90);
    }
    .article-header {
        padding: 10px;
        margin-top: 10px;
        margin-bottom: 10px;
        color: black;
        width: 100%;
        background-color: rgb(255, 255, 255);
    }
    .main {
        width: 100%;
        background-color: rgb(255, 255, 255);
        color: black;
        padding: 10px;
        height: 80px;
    }
</style>
<body>
    <div class="container">
        <div class="header">Page Header</div>
        <div class="nav">Nav</div>
        <div class="article">Article
            <div class="article-header">Article Header</div>
            <div class="main">Main</div>
        </div>
        <div class="section">Section</div>
        <div class="aside">Aside</div>
        <div class="footer">Footer</div>
    </div>
</body>
</html>
