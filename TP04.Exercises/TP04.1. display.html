<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP04.1 display</title>
</head>
<style>
    body {
        margin: auto;
        width: 600px;
        height: 600px;
        display: flex;
        flex-wrap: wrap;
        border: 4px black solid;
        justify-content: space-evenly;
        align-items: center;
    }
    .parent {
        width: 200px;
        height: 200px;
        background-color: #D9D9D9;
        padding: 5px;
        display: flex;
    }
    .parent-2 {
        /* justify-content: start; */
        align-items: end;
    }
    .parent-3 {
        justify-content: center;
        align-items: center;
    }

    .parent-4 {
        justify-content: end;
        align-items: center;
    }

    .child {
        width: 50px;
        height: 50px;
        background-color: #FF8A00;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
    }
</style>
<body>
    <div class="parent parent-1">
        <div class="child child1">child</div>
    </div>
    <div class="parent parent-2">
        <div class="child child2">child</div>
    </div>
    <div class="parent parent-3">
        <div class="child">child</div>
    </div>
    <div class="parent parent-4">
        <div class="child">child</div>
    </div>
</body>
</html>
