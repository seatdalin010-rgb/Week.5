<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP04.2 display</title>
</head>
<style>
    body {
        margin: auto;
        width: 600px;
        height: 600px;
        display: flex;
        flex-wrap: wrap;
        border: 4px black solid;
        justify-content: space-evenly;
        align-items: center;
    }
    .parent {
        width: 200px;
        height: 200px;
        background-color: #D9D9D9;
        padding: 5px;
        display: flex;
    }
    .child {
        background-color: #FF8A00;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
    }
    .parent-1 {
        justify-content: flex-start;
        align-items: flex-start;
    }
    .child1 {
        width: 100%;
        height: 50px;
    }
    .parent-2 {
        justify-content: flex-start;
        align-items: stretch;
    }
    .child2 {
        width: 50%;
    }
    .parent-3 {
        justify-content: center;
        align-items: center;
    }
    .child3 {
        width: 200px;
        height: 50px;
    }
    .parent-4 {
        justify-content: flex-start;
        align-items: flex-end;
    }
    .child4 {
        width: 100%;
        height: 50px;
    }
</style>
<body>
    <div class="parent parent-1">
        <div class="child child1">child</div>
    </div>
    <div class="parent parent-2">
        <div class="child child2">child</div>
    </div>
    <div class="parent parent-3">
        <div class="child child3">child</div>
    </div>
    <div class="parent parent-4">
        <div class="child child4">child</div>
    </div>
</body>
</html>
