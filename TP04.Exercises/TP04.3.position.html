<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP04.3 position</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        padding: 30px;
    }
    h2 {
        color: #E07B00;
    }
    .row {
        display: flex;
        gap: 40px;
        flex-wrap: wrap;
    }
    .wrapper {
        width: 200px;
        height: 200px;
        background-color: #D9D9D9;
        border: 1px solid #bbb;
        box-sizing: border-box;
        position: relative;
    }
    .box {
        width: 50px;
        height: 50px;
        background-color: #1F5C7A;
        border: 3px solid #FF8A00;
        box-sizing: border-box;
    }
    .inner {
        display: flex;
    }
    .w1 .inner {
        position: absolute;
        left: 50%;
        top: 50%;
        translate: -50% -50%;
        flex-direction: row;
        justify-content: center;
    }
    .w2 .inner {
        position: absolute;
        left: 50%;
        top: 50%;
        translate: -50% -50%;
        flex-direction: column;
    }
    .w3 .inner {
        position: absolute;
        left: 50%;
        bottom: 10px;
        translate: -50% 0;
        flex-direction: row;
    }
    .w4 .inner {
        position: absolute;
        right: 10px;
        top: 50%;
        translate: 0 -50%;
        flex-direction: column;
    }
</style>
<body>
    <div class="row">
        <div class="wrapper w1">
            <div class="inner"><div class="box"></div><div class="box"></div><div class="box"></div></div>
        </div>
        <div class="wrapper w2">
            <div class="inner"><div class="box"></div><div class="box"></div><div class="box"></div></div>
        </div>
        <div class="wrapper w3">
            <div class="inner"><div class="box"></div><div class="box"></div><div class="box"></div></div>
        </div>
        <div class="wrapper w4">
            <div class="inner"><div class="box"></div><div class="box"></div><div class="box"></div></div>
        </div>
    </div>
</body>
</html>
