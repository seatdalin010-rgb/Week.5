<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP04.3 display</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        padding: 30px;
    }
    h2 {
        color: #E07B00;
    }
    .row {
        display: flex;
        gap: 40px;
        flex-wrap: wrap;
    }
    .wrapper {
        width: 200px;
        height: 200px;
        background-color: #D9D9D9;
        border: 1px solid #bbb;
        box-sizing: border-box;
    }
    .box {
        width: 50px;
        height: 50px;
        background-color: #1F5C7A;
        border: 3px solid #FF8A00;
        box-sizing: border-box;
    }
    .w1 {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
    }
    .w2 {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    .w3 {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: flex-end;
        padding-bottom: 10px;
    }
    .w4 {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-end;
        padding-right: 10px;
    }
</style>
<body>
    <div class="row">
        <div class="wrapper w1">
            <div class="box"></div><div class="box"></div><div class="box"></div>
        </div>
        <div class="wrapper w2">
            <div class="box"></div><div class="box"></div><div class="box"></div>
        </div>
        <div class="wrapper w3">
            <div class="box"></div><div class="box"></div><div class="box"></div>
        </div>
        <div class="wrapper w4">
            <div class="box"></div><div class="box"></div><div class="box"></div>
        </div>
    </div>
</body>
</html>
